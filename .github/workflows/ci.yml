name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Set up a Python so flight-core (which links libpython) can build & test.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          PYO3_PYTHON: python
      - name: test
        run: cargo test --workspace
        env:
          PYO3_PYTHON: python

  python:
    name: Python (maturin build + pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # maturin develop needs an active virtualenv; create one and keep it on
      # PATH for the following steps.
      - name: Set up virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - name: Install (maturin develop) + test deps
        run: |
          python -m pip install --upgrade pip maturin pytest textual
          maturin develop
      - name: pytest
        run: pytest -q
